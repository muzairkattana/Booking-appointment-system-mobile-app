name: record_linux
description: Patched local version of record_linux 0.7.2 that implements startStream and the updated hasPermission signature required by record_platform_interface >=1.5.0.
version: 0.7.3

environment:
  sdk: ^3.3.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  record_platform_interface: ">=1.0.2 <2.0.0"

flutter:
  plugin:
    implements: record
    platforms:
      linux:
        pluginClass: RecordLinuxPlugin
        dartPluginClass: RecordLinux
